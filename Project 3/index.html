<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusHub</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>FocusHub</h1>
      <span class="inspire">Great for starting your Day</span>
      <div class="dashboard-grid">
        <section class="card timer-widget">
          <a href="index.html" class="widget focus-timer">Focus Timer</a>
        </section>
        <section class="card notes-widget">
          <a href="pages/quickNotes.html" class="widget quick-notes"
            >Quick Notes</a
          >
        </section>
        <section class="card todo-widget">
          <a href="pages/todayFocus.html" class="widget today-focus"
            >Today Focus</a
          >
        </section>
      </div>
    </header>
    <main class="layout">
      <div class="timer_container">
        <div class="js-timer timer">20:00</div>
        <div class="controls">
          <button class="js-start-button start_btn">Start</button>
          <button class="js-reset-button reset_btn">Reset</button>
        </div>
      </div>
    </main>
    <script src="index.js"></script>
  </body>
</html>
